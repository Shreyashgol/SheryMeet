<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Meeting Intelligence</title>
    <!--
      Apply the persisted / system theme BEFORE first paint to prevent a
      light→dark flash (FOUC). Kept inline and tiny so it runs synchronously.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored === "dark" || ((stored === "system" || !stored) && systemDark);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
