# Render Blueprint — deploy SheryMeet on the FREE tier.
#
# Topology on free tier (Render has no free background workers / Redis for real
# async), so the API runs the pipeline INLINE (CELERY_TASK_ALWAYS_EAGER=true):
#
#   Neon (external, free)            → Postgres
#   Render Static Site (free)        → React SPA  (sherymeet-web)
#   Render Web Service, Docker (free)→ FastAPI + inline pipeline (sherymeet-api)
#
# Set the two SECRET env vars (DATABASE_URL, GROQ_API_KEY) in the Render dashboard
# (they are marked sync:false and are NOT stored in this file). After the first
# deploy, update the two cross-referenced URLs (CORS_ALLOW_ORIGINS, VITE_API_URL)
# to the real service URLs Render assigns, then redeploy.

services:
  # ── Backend API (Docker; runs migrations on boot, serves + processes) ────────
  - type: web
    name: sherymeet-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL            # Neon pooled URL: postgresql+psycopg2://...?sslmode=require
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: ASR_PROVIDER
        value: groq_whisper
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3-turbo
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: STORAGE_LOCAL_DIR
        value: /tmp/audio            # ephemeral scratch; fine for inline processing
      - key: API_WORKERS
        value: "1"                   # keep memory low on the 512 MB free instance
      - key: LOG_JSON
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        value: https://sherymeet-web.onrender.com   # <-- set to your static site URL

  # ── Frontend SPA (static site) ───────────────────────────────────────────────
  - type: web
    name: sherymeet-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://sherymeet-api.onrender.com/api/v1   # <-- set to your API URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
